<!DOCTYPE html>
<html>
    <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="responsive.css">
        <style>
            body {
              background-color: #ceb095;
              margin: 0;
              font-family: Arial, sans-serif;
            }
        </style>
    </head>
    <body>
        <nav>
            <img src=".\images\Logo.png" id="Logo">
            <a href="#home">Facebook</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
          </nav>
        <div class="container">
          <img src=".\images\milktea1.png" id="milktea1">
          <img src=".\images\good.png" id="good">
          <a href=""><button class="button">Order Now</button></a>
          <img src=".\images\milkflow.png" id="milkflow">
          <img src=".\images\milktea3.png" id="milktea3">
          <img src=".\images\bottom.png" id="bottom">
          <img src=".\images\girlbot.png" id="girl">
          <img src=".\images\navbot.png" id="navbot">
        </div>
        <div class="contact">
          <h2>We'd Love To Hear From You</h2>
          <form action="#" method="post" id="contactForm">
            <div class="input-group">
              <label for="name">Name</label>
              <input type="text" id="name" name="name" required>
            </div>
            <div class="input-group">
              <label for="email">Email</label>
              <input type="email" id="email" name="email" required>
            </div>
            <div class="input-group">
              <label for="message">Message</label>
              <textarea id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="con">Submit</button>
          </form>
        </div>
    </body>
</html>
